  - type: http
    namespace: identity-users
    baseUri: https://api.veracode.com
    description: Veracode Identity REST API — Users business capability. Self-contained, no shared references.
    resources:
    - name: api-authn-v2-users
      path: /api/authn/v2/users
      operations:
      - name: listusers
        method: GET
        description: List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
        - name: size
          in: query
          type: integer
      - name: createuser
        method: POST
        description: Create User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-authn-v2-users-search
      path: /api/authn/v2/users/search
      operations:
      - name: searchusers
        method: GET
        description: Search Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: search_term
          in: query
          type: string
        - name: api_id
          in: query
          type: string
        - name: role_id
          in: query
          type: string
        - name: user_type
          in: query
          type: string
        - name: saml_user
          in: query
          type: boolean
    - name: api-authn-v2-users-self
      path: /api/authn/v2/users/self
      operations:
      - name: getcurrentuser
        method: GET
        description: Get Current User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-authn-v2-users-userId
      path: /api/authn/v2/users/{userId}
      operations:
      - name: updateuser
        method: PUT
        description: Update User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteuser
        method: DELETE
        description: Delete User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: identity-users-rest
    port: 8080
    description: REST adapter for Veracode Identity REST API — Users. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/authn/v2/users
      name: api-authn-v2-users
      description: REST surface for api-authn-v2-users.
      operations:
      - method: GET
        name: listusers
        description: List Users
        call: identity-users.listusers
        with:
          page: rest.page
          size: rest.size
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createuser
        description: Create User
        call: identity-users.createuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/authn/v2/users/search
      name: api-authn-v2-users-search
      description: REST surface for api-authn-v2-users-search.
      operations:
      - method: GET
        name: searchusers
        description: Search Users
        call: identity-users.searchusers
        with:
          search_term: rest.search_term
          api_id: rest.api_id
          role_id: rest.role_id
          user_type: rest.user_type
          saml_user: rest.saml_user
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/authn/v2/users/self
      name: api-authn-v2-users-self
      description: REST surface for api-authn-v2-users-self.
      operations:
      - method: GET
        name: getcurrentuser
        description: Get Current User
        call: identity-users.getcurrentuser
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/authn/v2/users/{userid}
      name: api-authn-v2-users-userid
      description: REST surface for api-authn-v2-users-userId.
      operations:
      - method: PUT
        name: updateuser
        description: Update User
        call: identity-users.updateuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteuser
        description: Delete User
        call: identity-users.deleteuser
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: identity-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Veracode Identity REST API — Users. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
