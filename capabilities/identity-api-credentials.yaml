naftiko: 1.0.0-alpha2
info:
  label: Veracode Identity REST API — API Credentials
  description: 'Veracode Identity REST API — API Credentials. 4 operations. Lead operation: Generate API Credentials. Self-contained
    Naftiko capability covering one Veracode business surface.'
  tags:
  - Veracode
  - API Credentials
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VERACODE_API_KEY: VERACODE_API_KEY
capability:
  consumes:
  - type: http
    namespace: identity-api-credentials
    baseUri: https://api.veracode.com
    description: Veracode Identity REST API — API Credentials business capability. Self-contained, no shared references.
    resources:
    - name: api-authn-v2-api_credentials
      path: /api/authn/v2/api_credentials
      operations:
      - name: generateapicredentials
        method: POST
        description: Generate API Credentials
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getapicredentialexpiration
        method: GET
        description: Get API Credential Expiration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-authn-v2-api_credentials-apiCredsId
      path: /api/authn/v2/api_credentials/{apiCredsId}
      operations:
      - name: getapicredentialbyid
        method: GET
        description: Get API Credential
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apiCredsId
          in: path
          type: string
          required: true
      - name: revokeapicredentials
        method: DELETE
        description: Revoke API Credentials
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apiCredsId
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: identity-api-credentials-rest
    port: 8080
    description: REST adapter for Veracode Identity REST API — API Credentials. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/api/authn/v2/api-credentials
      name: api-authn-v2-api-credentials
      description: REST surface for api-authn-v2-api_credentials.
      operations:
      - method: POST
        name: generateapicredentials
        description: Generate API Credentials
        call: identity-api-credentials.generateapicredentials
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getapicredentialexpiration
        description: Get API Credential Expiration
        call: identity-api-credentials.getapicredentialexpiration
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/authn/v2/api-credentials/{apicredsid}
      name: api-authn-v2-api-credentials-apicredsid
      description: REST surface for api-authn-v2-api_credentials-apiCredsId.
      operations:
      - method: GET
        name: getapicredentialbyid
        description: Get API Credential
        call: identity-api-credentials.getapicredentialbyid
        with:
          apiCredsId: rest.apiCredsId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: revokeapicredentials
        description: Revoke API Credentials
        call: identity-api-credentials.revokeapicredentials
        with:
          apiCredsId: rest.apiCredsId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: identity-api-credentials-mcp
    port: 9090
    transport: http
    description: MCP adapter for Veracode Identity REST API — API Credentials. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: generate-api-credentials
      description: Generate API Credentials
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: identity-api-credentials.generateapicredentials
      outputParameters:
      - type: object
        mapping: $.
    - name: get-api-credential-expiration
      description: Get API Credential Expiration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: identity-api-credentials.getapicredentialexpiration
      outputParameters:
      - type: object
        mapping: $.
    - name: get-api-credential
      description: Get API Credential
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: identity-api-credentials.getapicredentialbyid
      with:
        apiCredsId: tools.apiCredsId
      outputParameters:
      - type: object
        mapping: $.
    - name: revoke-api-credentials
      description: Revoke API Credentials
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: identity-api-credentials.revokeapicredentials
      with:
        apiCredsId: tools.apiCredsId
      outputParameters:
      - type: object
        mapping: $.
