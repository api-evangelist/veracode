naftiko: 1.0.0-alpha2
info:
  label: Veracode Applications REST API — Applications
  description: 'Veracode Applications REST API — Applications. 5 operations. Lead operation: List Applications. Self-contained
    Naftiko capability covering one Veracode business surface.'
  tags:
  - Veracode
  - Applications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VERACODE_API_KEY: VERACODE_API_KEY
capability:
  consumes:
  - type: http
    namespace: applications-applications
    baseUri: https://api.veracode.com
    description: Veracode Applications REST API — Applications business capability. Self-contained, no shared references.
    resources:
    - name: appsec-v1-applications
      path: /appsec/v1/applications
      operations:
      - name: listapplications
        method: GET
        description: List Applications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Filter applications by name
        - name: policy_compliance
          in: query
          type: string
          description: Filter by compliance status
        - name: tag
          in: query
          type: string
          description: Filter by application tag
        - name: modified_after
          in: query
          type: string
          description: Filter by last modified date (ISO 8601 format)
        - name: page
          in: query
          type: integer
          description: Page number for pagination
        - name: size
          in: query
          type: integer
          description: Page size (max 500)
      - name: createapplication
        method: POST
        description: Create Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: appsec-v1-applications-applicationGuid
      path: /appsec/v1/applications/{applicationGuid}
      operations:
      - name: getapplication
        method: GET
        description: Get Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateapplication
        method: PUT
        description: Update Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteapplication
        method: DELETE
        description: Delete Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: applications-applications-rest
    port: 8080
    description: REST adapter for Veracode Applications REST API — Applications. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/appsec/v1/applications
      name: appsec-v1-applications
      description: REST surface for appsec-v1-applications.
      operations:
      - method: GET
        name: listapplications
        description: List Applications
        call: applications-applications.listapplications
        with:
          name: rest.name
          policy_compliance: rest.policy_compliance
          tag: rest.tag
          modified_after: rest.modified_after
          page: rest.page
          size: rest.size
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createapplication
        description: Create Application
        call: applications-applications.createapplication
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/appsec/v1/applications/{applicationguid}
      name: appsec-v1-applications-applicationguid
      description: REST surface for appsec-v1-applications-applicationGuid.
      operations:
      - method: GET
        name: getapplication
        description: Get Application
        call: applications-applications.getapplication
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateapplication
        description: Update Application
        call: applications-applications.updateapplication
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteapplication
        description: Delete Application
        call: applications-applications.deleteapplication
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: applications-applications-mcp
    port: 9090
    transport: http
    description: MCP adapter for Veracode Applications REST API — Applications. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-applications
      description: List Applications
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: applications-applications.listapplications
      with:
        name: tools.name
        policy_compliance: tools.policy_compliance
        tag: tools.tag
        modified_after: tools.modified_after
        page: tools.page
        size: tools.size
      outputParameters:
      - type: object
        mapping: $.
    - name: create-application
      description: Create Application
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: applications-applications.createapplication
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-application
      description: Get Application
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: applications-applications.getapplication
      outputParameters:
      - type: object
        mapping: $.
    - name: update-application
      description: Update Application
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: applications-applications.updateapplication
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-application
      description: Delete Application
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: applications-applications.deleteapplication
      outputParameters:
      - type: object
        mapping: $.
