naftiko: "1.0.0-alpha1"

info:
  label: "Veracode Applications API"
  description: "Manage application profiles, sandboxes, and policy compliance in the Veracode Platform."
  tags:
    - Veracode
    - Applications
    - Portfolio
    - Application Security
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VERACODE_API_ID: VERACODE_API_ID
      VERACODE_API_KEY: VERACODE_API_KEY

capability:
  consumes:
    - type: http
      namespace: veracode-applications
      baseUri: https://api.veracode.com
      description: "Veracode Applications REST API"
      authentication:
        type: hmac
        apiId: "{{VERACODE_API_ID}}"
        apiKey: "{{VERACODE_API_KEY}}"
      resources:
        - name: applications
          path: /appsec/v1/applications
          description: "Application portfolio management"
          operations:
            - name: list-applications
              method: GET
              description: "List all applications in portfolio with filtering"
              inputParameters:
                - name: name
                  in: query
                  type: string
                  required: false
                  description: "Filter by application name"
                - name: policy_compliance
                  in: query
                  type: string
                  required: false
                  description: "Filter by policy compliance status"
                - name: tag
                  in: query
                  type: string
                  required: false
                  description: "Filter by tag"
                - name: modified_after
                  in: query
                  type: string
                  required: false
                  description: "Filter by modification date"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: size
                  in: query
                  type: integer
                  required: false
                  description: "Page size"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-application
              method: POST
              description: "Create a new application profile"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  profile: "{{tools.profile}}"

        - name: application-by-id
          path: /appsec/v1/applications/{applicationGuid}
          description: "Individual application management"
          operations:
            - name: get-application
              method: GET
              description: "Get details for a specific application"
              inputParameters:
                - name: applicationGuid
                  in: path
                  type: string
                  required: true
                  description: "Application GUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-application
              method: PUT
              description: "Update an application profile"
              inputParameters:
                - name: applicationGuid
                  in: path
                  type: string
                  required: true
                  description: "Application GUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  profile: "{{tools.profile}}"
            - name: delete-application
              method: DELETE
              description: "Delete an application profile"
              inputParameters:
                - name: applicationGuid
                  in: path
                  type: string
                  required: true
                  description: "Application GUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: policy-compliance
          path: /appsec/v1/applications/{applicationGuid}/policy_compliance
          description: "Application policy compliance status"
          operations:
            - name: get-policy-compliance
              method: GET
              description: "Get policy compliance evaluation for an application"
              inputParameters:
                - name: applicationGuid
                  in: path
                  type: string
                  required: true
                  description: "Application GUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
