naftiko: 1.0.0-alpha2
info:
  label: Veracode Applications REST API — Policy Evaluations
  description: 'Veracode Applications REST API — Policy Evaluations. 1 operations. Lead operation: Get Application Policy
    Compliance. Self-contained Naftiko capability covering one Veracode business surface.'
  tags:
  - Veracode
  - Policy Evaluations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VERACODE_API_KEY: VERACODE_API_KEY
capability:
  consumes:
  - type: http
    namespace: applications-policy-evaluations
    baseUri: https://api.veracode.com
    description: Veracode Applications REST API — Policy Evaluations business capability. Self-contained, no shared references.
    resources:
    - name: appsec-v1-applications-applicationGuid-policy_compliance
      path: /appsec/v1/applications/{applicationGuid}/policy_compliance
      operations:
      - name: getapplicationpolicycompliance
        method: GET
        description: Get Application Policy Compliance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: applications-policy-evaluations-rest
    port: 8080
    description: REST adapter for Veracode Applications REST API — Policy Evaluations. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/appsec/v1/applications/{applicationguid}/policy-compliance
      name: appsec-v1-applications-applicationguid-policy-compliance
      description: REST surface for appsec-v1-applications-applicationGuid-policy_compliance.
      operations:
      - method: GET
        name: getapplicationpolicycompliance
        description: Get Application Policy Compliance
        call: applications-policy-evaluations.getapplicationpolicycompliance
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: applications-policy-evaluations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Veracode Applications REST API — Policy Evaluations. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: get-application-policy-compliance
      description: Get Application Policy Compliance
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: applications-policy-evaluations.getapplicationpolicycompliance
      outputParameters:
      - type: object
        mapping: $.
