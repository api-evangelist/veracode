meters:
  - name: platform_subscription
    description: Annual Veracode platform subscription line; entitlements for SAST / DAST / SCA scans
      and seats are scoped in the order form.
    unit: varies
    aggregation: sum
principles:
  - name: Visibility
    description: Veracode exposes scan and finding telemetry via the Reporting, Findings, and Summary
      Report REST APIs; there is no public cost / usage API. Track entitlement consumption (scan-counts,
      seats) against the order-form scope.
  - name: Allocation
    description: Allocation is contract-level (which application portfolios and teams are entitled).
      Internal chargeback typically rides on application ownership tags applied in the Veracode platform.
  - name: Optimization
    description: Optimization levers include scoping which apps are scanned, scan cadence, and avoiding
      wasted polling (the docs require 2-minute minimum spacing on status checks and cap retries at 5).
  - name: Accountability
    description: Accountability sits with the AppSec team that owns the Veracode tenant; finance owns
      the annual subscription line.
