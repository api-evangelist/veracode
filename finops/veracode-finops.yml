description: 'FOCUS-aligned FinOps stub for Veracode: enterprise application-security SaaS subscription
  with no public pricing or usage/billing API. API access is bundled with the platform subscription.'
sources:
  - https://www.veracode.com/pricing
  - https://docs.veracode.com/r/About_Veracode_API_Best_Practices
notes: No public pricing. Meters are not invented; API call counts are operational telemetry rather than
  billable units. Reconciliation deferred pending customer-portal billing data.
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Veracode Application Security Platform
