description: Veracode publishes no public pricing for the Veracode Application Security Platform. The pricing
  page directs all visitors to Request a Demo or Contact Sales. There is no published self-serve developer
  plan and no public per-tier API quota pricing; API access is bundled with the underlying paid platform
  subscription.
sources:
  - https://www.veracode.com/pricing
notes: Pricing is gated behind sales. No public tiers, no developer pricing. Reconciliation to a single
  Contact Sales plan; revisit if Veracode publishes self-serve API pricing.
plans:
  - id: veracode-contact-sales
    name: Contact Sales
    type: enterprise
    description: Custom-quoted Veracode platform subscription. SAST / DAST / SCA / IAST coverage, scan
      volume, and seats drive price; API access is included with the underlying platform license.
    entries:
      - label: Platform Subscription
        name: platform_subscription
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Veracode Static Analysis (SAST)
      - name: Veracode Dynamic Analysis (DAST)
      - name: Veracode Software Composition Analysis (SCA)
      - name: REST + XML APIs
      - name: Customer Support
